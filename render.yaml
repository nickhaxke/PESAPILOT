services:
  - type: web
    name: pesapilot
    runtime: node
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_HOST
        sync: false
      - key: DB_USER  
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
